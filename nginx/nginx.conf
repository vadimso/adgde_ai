resolver 127.0.0.11:53 valid=10s;
resolver_timeout 5s;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=download_limit:10m rate=20r/m;

# Security headers
include security-headers.conf;

server {
  listen 80;
  server_name _;

  # Increase upload size limit to 100MB
  client_max_body_size 100M;

  # Security headers
  include security-headers.conf;

  # Health check endpoint
  location /health {
    access_log off;
    proxy_pass http://api:8000;
  }

  # API endpoints with rate limiting
  location /api/ {
    limit_req zone=api_limit burst=10 nodelay;

    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # Handle 413 errors
    error_page 413 =413 @reject_large_file;
  }

  # Download endpoints with stricter rate limit
  location ~ /api/.*/download {
    limit_req zone=download_limit burst=5 nodelay;

    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Longer timeouts for file downloads
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
  }

  # Large file uploads
  location ~ /api/.*/imports {
    # Higher rate limit for imports
    limit_req zone=api_limit burst=5 nodelay;

    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Longer timeouts for uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  # Catch all other routes
  location / {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  # Error pages
  @reject_large_file {
    return 413;
  }
}
